
<h2 class="page-title">Designation Management</h2>
  
<div 
  *ngIf="topMessage" 
  class="top-message" 
  [ngClass]="topMessageType === 'success' ? 'top-message-success' : 'top-message-error'">
  {{ topMessage }}
</div>


<div class="grid-container mat-elevation-z8">
  <div class="table-command-bar">
    <button mat-flat-button color="primary" class="btn-primary-dark" (click)="addDesignation()">
      <mat-icon>add</mat-icon>
      Add new designation
      
    </button>
  </div>

<div class="grid-search-wrapper">
  <mat-form-field appearance="outline" class="grid-search-input">
    <input matInput placeholder="Search ..." [(ngModel)]="searchText" (input)="applyFilter()">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>
</div>


  <table mat-table [dataSource]="dataSource" class="mat-elevation-z8 my-grid" *ngIf="designations.length > 0">
    
    <ng-container matColumnDef="designationName">
      <th mat-header-cell *matHeaderCellDef> Designation Name </th>
      <td mat-cell *matCellDef="let d"> {{ d.designationName }} </td>
    </ng-container>

    <ng-container matColumnDef="edit">
      <th mat-header-cell *matHeaderCellDef style="width: 80px; text-align: center;"> Edit </th>
      <td mat-cell *matCellDef="let d" style="text-align: center;">
        <button mat-icon-button color="primary" (click)="edit(d)">
          <mat-icon>edit</mat-icon>
        </button>
      </td>
    </ng-container>

    <ng-container matColumnDef="delete">
      <th mat-header-cell *matHeaderCellDef style="width: 80px; text-align: center;"> Delete </th>
      <td mat-cell *matCellDef="let d" style="text-align: center;">
        <button mat-icon-button color="warn" (click)="delete(d)">
          <mat-icon>delete</mat-icon>
        </button>
      </td>
    </ng-container>

  <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
  
 <tr mat-row 
    *matRowDef="let row; columns: displayedColumns;"
    [class.editing-row]="editingId == row.designationId">
</tr>
  </table>
  
 <div class="no-data" *ngIf="dataSource.filteredData.length === 0">
  No designations found.
</div>
  <mat-paginator
    class="my-paginator"
    [pageSizeOptions]="[5, 10, 20]"
    [pageSize]="10"
    showFirstLastButtons>
  </mat-paginator>

</div>
